openapi: 3.0.1
info:
  title: Bestellsystem API
  version: v0.0.1
servers:
  - url: http://localhost:3000/api/v1
    description: Generated server url
paths:
  /addresses:
    get:
      tags:
        - Addresses
      
      operationId: getAllAddresses
      responses:
        '200':
          description: A list of addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressResponseDTO'
    post:
      tags:
        - Addresses
      
      operationId: createAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequestDTO'
      responses:
        '201':
          description: Address created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponseDTO'
        '400':
          description: Invalid input
  /addresses/{id}:
      get:
        tags:
          - Addresses
        
        operationId: getAddressById
        parameters:
          - name: id
            in: path
            required: true
            description: Unique identifier of the address
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: Address found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/AddressResponseDTO'
          '404':
            description: Address not found
  /persons/{id}:
    get:
      tags:
        - Persons
      
      operationId: getPersonById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PersonResponseDTO'
  /persons:
    get:
      tags:
        - Persons
      
      operationId: getAllPersons
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonResponseDTO'
    post:
      tags:
        - Persons
      
      operationId: createPerson
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonRequestDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PersonResponseDTO'
  /suppliers:
    get:
      tags:
        - Suppliers
      operationId: getAllSuppliers
      responses:
        '200':
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupplierResponseDTO'
    post:
      tags:
        - Suppliers
      operationId: createSupplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplierRequestDTO'
      responses:
        '201':
          description: Lieferant erfolgreich erstellt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponseDTO'
        '400':
          description: Ungültige Eingabe(n).
  /suppliers/{supplier-id}:
    get:
      tags:
        - Suppliers
      operationId: getSupplierById
      parameters:
        - name: supplier-id
          in: path
          required: true
          description: Die eindeutige ID des Lieferanten, welcher abgerufen werden soll.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Lieferant gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponseDTO'
        '404':
          description: Lieferant nicht gefunden.
  /suppliers/{supplier-id}/customer_ids:
    get:
      tags:
        - Suppliers
      operationId: getCustomerIdsOfOrder
      parameters:
        - name: supplier-id
          in: path
          required: true
          description: Die eindeutige ID des Lieferanten, für welchen die Kundennummern abgerufen werden sollen.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Liste der Kundennummern eines Lieferanten.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerIdResponseDTO'
        '404':
          description: Lieferant nicht gefunden.
  /orders:
    get:
      tags:
        - Orders
      operationId: getAllOrders
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponseDTO'
    post:
      tags:
        - Orders
      operationId: createOrder
      description: >
        Erstellt eine neue Bestellung und setzt den `status` auf "In Bearbeitung".
        `booking_year` & `primary_cost_center_id` sind verpflichtend, um eine neue Bestellung anlegen zu können.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequestDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/OrderResponseDTO'
  /orders/{order-id}:
    get:
      tags:
        - Orders
      operationId: getOrderById
      parameters:
        - name: order-id
          in: path
          required: true
          description: Die eindeutige ID der Bestellung, die abgerufen werden soll.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                  $ref: '#/components/schemas/OrderResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
  /orders/{order-id}/items:
    get:
      tags:
        - Orders
      operationId: getOrderItems
      parameters:
        - in: path
          name: order-id
          required: true
          schema:
            type: string
          description: Die eindeutige ID der Bestellung, für welche die Artikel abgerufen werden sollen.
      responses:
        '200':
          description: Erfolgreich abgerufene Artikel einer Bestellung.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
    post:
      tags:
        - Orders
      operationId: createOrderItems
      parameters:
        - name: order-id
          in: path
          required: true
          description: Die eindeutige ID der Bestellung, für welche neue Artikel angelegt werden sollen.
          schema:
            type: integer
            format: int64
      description: >
        Erstellt neue Artikel einer Bestellung.
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/ItemRequestDTO'
        required: true
      responses:
        '201':
          description: OK
          content:
            '*/*':
              schema:
                items:
                  $ref: '#/components/schemas/ItemResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
  /orders/{order-id}/quotations:
    get:
      tags:
        - Orders
      operationId: getOrderQuotations
      parameters:
        - in: path
          name: order-id
          required: true
          schema:
            type: string
          description: Die eindeutige ID der Bestellung, für welche die Vergleichsangebote abgerufen werden sollen.
      responses:
        '200':
          description: Erfolgreich abgerufene Vergleichsangebote einer Bestellung.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuotationResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
    post:
      tags:
        - Orders
      operationId: createOrderQuotations
      parameters:
        - name: order-id
          in: path
          required: true
          description: Die eindeutige ID der Bestellung, für welche neue Vergleichsangebote angelegt werden sollen.
          schema:
            type: integer
            format: int64
      description: >
        Erstellt neue Vergleichsangebote einer Bestellung.
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/QuotationRequestDTO'
        required: true
      responses:
        '201':
          description: OK
          content:
            '*/*':
              schema:
                items:
                  $ref: '#/components/schemas/QuotationResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
  /orders/{order-id}/export:
    get:
      tags:
        - Orders
      operationId: exportOrderToFormula
      parameters:
        - in: path
          name: order-id
          required: true
          schema:
            type: string
          description: Die eindeutige ID der Bestellung, für welche die Bestellung als PDF ins Bestellformular exportiert wird.
      responses:
        '200':
          description: Successfully retrieved PDF formula for the order.
          content:
            application/pdf: { }
        '404':
          description: Bestellung nicht gefunden.
  /cost_centers:
    get:
      tags:
        - CostCenters
      operationId: getCostCenters
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CostCenterResponseDTO'
    post:
      tags:
        - CostCenters
      operationId: createCostCenter
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostCenterRequestDTO'
        required: true
      responses:
        '201':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CostCenterResponseDTO'
        '409':
          description: Kostenstelle mit diesem Namen existiert bereits.
  /vats:
    get:
      tags:
        - Vat's
      operationId: getAllVats
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VatResponseDTO'
  /users:
    get:
      tags:
        - Users
      operationId: getAllUsers
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponseDTO'
  /currencies:
    get:
      tags:
        - Currencies
      operationId: getAllCurrencies
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CurrencyResponseDTO'
  /users/{id}:
    get:
      tags:
        - Users
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/UserResponseDTO'
components:
  schemas:
    PersonRequestDTO:
      type: object
      properties:
        name:
          type: string
        surname:
          type: string
        email:
          type: string
        fax:
          type: string
        phone:
          type: string
        title:
          type: string
        comment:
          type: string
        address_id:
          type: integer
        gender:
          type: string
          enum:
            - m
            - f
    PersonResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        surname:
          type: string
        email:
          type: string
        fax:
          type: string
        phone:
          type: string
        title:
          type: string
        comment:
          type: string
        address_id:
          type: integer
        gender:
          type: string
          enum:
            - m
            - f
    ItemRequestDTO:
      type: object
      properties:
        name:
          type: string
        price_per_unit:
          type: number
        quantity:
          type: integer
          format: int64
        quantity_unit:
          type: string
        article_id:
          type: string
        comment:
          type: string
        vat_value:
          type: string
        preferred_list:
          type: string
          enum:
            - RZ
            - TA
        preferred_list_number:
          type: string
        vat_type:
          type: string
          enum:
            - netto
            - brutto
    OrderRequestDTO:
      type: object
      required:
        - booking_year
        - primary_cost_center_id
      properties:
        primary_cost_center_id:
          type: string
        booking_year:
          type: string
          minLength: 2
          maxLength: 2
        legacy_alias:
          type: string
        owner_id:
          type: string
        content_description:
          type: string
        currency_short:
          type: string
        comment:
          type: string
        comment_for_supplier:
          type: string
        quote_number:
          type: string
        quote_sign:
          type: string
        quote_date:
          type: string
          format: date
        quote_price:
          type: number
        delivery_person_id:
          type: integer
          format: int64
        invoice_person_id:
          type: integer
          format: int64
        queries_person_id:
          type: integer
          format: int64
        customer_id:
          type: string
        supplier_id:
          type: integer
          format: int32
        secondary_cost_center_id:
          type: string
        fixed_discount:
          type: number
        percentage_discount:
          type: number
        cashback_percentage:
          type: number
        cashback_days:
          type: integer
          format: int32
        last_updated_time:
          type: string
          format: date-time
        flag_decision_cheapest_offer:
          type: boolean
        flag_decision_sole_supplier:
          type: boolean
        flag_decision_contract_partner:
          type: boolean
        flag_decision_other_reasons:
          type: boolean
        decision_other_reasons_description:
          type: string
        flag_edv_permission:
          type: boolean
        flag_furniture_permission:
          type: boolean
        flag_furniture_room:
          type: boolean
        flag_investment_room:
          type: boolean
        flag_investment_structural_measures:
          type: boolean
        flag_media_permission:
          type: boolean
        dfg_key:
          type: string
    OrderPatchRequestDTO:
      type: object
      properties:
        primary_cost_center_id:
          type: string
        booking_year:
          type: string
          minLength: 2
          maxLength: 2
        legacy_alias:
          type: string
        owner_id:
          type: string
        content_description:
          type: string
        status:
          type: string
          enum:
            - ABR
            - ABS
            - ARC
            - DEL
            - INB
        currency_short:
          type: string
        comment:
          type: string
        comment_for_supplier:
          type: string
        quote_number:
          type: string
        quote_sign:
          type: string
        quote_date:
          type: string
          format: date
        quote_price:
          type: number
        delivery_person_id:
          type: integer
          format: int64
        invoice_person_id:
          type: integer
          format: int64
        queries_person_id:
          type: integer
          format: int64
        customer_id:
          type: string
        supplier_id:
          type: integer
          format: int32
        secondary_cost_center_id:
          type: string
        fixed_discount:
          type: number
        percentage_discount:
          type: number
        cashback_percentage:
          type: number
        cashback_days:
          type: integer
          format: int32
        last_updated_time:
          type: string
          format: date-time
        flag_decision_cheapest_offer:
          type: boolean
        flag_decision_sole_supplier:
          type: boolean
        flag_decision_contract_partner:
          type: boolean
        flag_decision_other_reasons:
          type: boolean
        decision_other_reasons_description:
          type: string
        flag_edv_permission:
          type: boolean
        flag_furniture_permission:
          type: boolean
        flag_furniture_room:
          type: boolean
        flag_investment_room:
          type: boolean
        flag_investment_structural_measures:
          type: boolean
        flag_media_permission:
          type: boolean
        dfg_key:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemRequestDTO'
        quotations:
          type: array
          items:
            $ref: '#/components/schemas/QuotationRequestDTO'
    QuotationRequestDTO:
      type: object
      properties:
        index:
          type: integer
          format: int32
        quote_date:
          type: string
          format: date
        price:
          type: number
        supplier_id:
          type: integer
          format: int64
    OrderResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        primary_cost_center_id:
          type: string
        booking_year:
          type: string
        auto_index:
          type: integer
          format: int32
        created_date:
          type: string
          format: date-time
        legacy_alias:
          type: string
        owner_id:
          type: string
        content_description:
          type: string
        status:
          type: string
          enum:
            - ABR
            - ABS
            - ARC
            - DEL
            - INB
        currency:
          $ref: '#/components/schemas/CurrencyResponseDTO'
        comment:
          type: string
        comment_for_supplier:
          type: string
        quote_number:
          type: string
        quote_sign:
          type: string
        quote_date:
          type: string
          format: date
        quote_price:
          type: number
        delivery_person_id:
          type: integer
          format: int64
        invoice_person_id:
          type: integer
          format: int64
        queries_person_id:
          type: integer
          format: int64
        customer_id:
          type: string
        supplier_id:
          type: integer
          format: int32
        secondary_cost_center_id:
          type: string
        fixed_discount:
          type: number
        percentage_discount:
          type: number
        cash_discount:
          type: number
        cashback_days:
          type: integer
          format: int32
        last_updated_time:
          type: string
          format: date-time
        flag_decision_cheapest_offer:
          type: boolean
        flag_decision_sole_supplier:
          type: boolean
        flag_decision_contract_partner:
          type: boolean
        flag_decision_other_reasons:
          type: boolean
        decision_other_reasons_description:
          type: string
        flag_edv_permission:
          type: boolean
        flag_furniture_permission:
          type: boolean
        flag_furniture_room:
          type: boolean
        flag_investment_room:
          type: boolean
        flag_investment_structural_measures:
          type: boolean
        flag_media_permission:
          type: boolean
        dfg_key:
          type: string
    CostCenterRequestDTO:
      type: object
      properties:
        name:
          type: string
        begin_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        comment:
          type: string
    CostCenterResponseDTO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        begin_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        comment:
          type: string
    VatResponseDTO:
      type: object
      properties:
        value:
          type: number
        description:
          type: string
    UserResponseDTO:
      type: object
      properties:
        id:
          type: string
        surname:
          type: string
        name:
          type: string
        email:
          type: string
    ItemResponseDTO:
      type: object
      properties:
        order_id:
          type: integer
          format: int64
        item_id:
          type: integer
          format: int32
        name:
          type: string
        price_per_unit:
          type: number
        quantity:
          type: integer
          format: int64
        quantity_unit:
          type: string
        article_id:
          type: string
        comment:
          type: string
        Vat's:
          $ref: '#/components/schemas/VatResponseDTO'
        preferred_list:
          type: string
          enum:
            - RZ
            - TA
        preferred_list_number:
          type: string
        vat_type:
          type: string
          enum:
            - netto
            - brutto
    CurrencyResponseDTO:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
    QuotationResponseDTO:
      type: object
      properties:
        order_id:
          type: integer
          format: int64
        index:
          type: integer
          format: int32
        quote_date:
          type: string
          format: date
        price:
          type: number
        supplier_id:
          type: integer
          format: int64
    InvoiceResponseDTO:
      type: object
      properties:
        id:
          type: string
        cost_center_id:
          type: string
        order_id:
          type: integer
          format: int64
        price:
          type: number
        date:
          type: string
          format: date
        comment:
          type: string
        created_date:
          type: string
          format: date-time
    InvoiceRequestDTO:
      type: object
      properties:
        id:
          type: string
        cost_center_id:
          type: string
        order_id:
          type: integer
          format: int64
        price:
          type: number
        date:
          type: string
          format: date
        comment:
          type: string
    AddressRequestDTO:
      type: object
      required:
        - town
      properties:
        postal_code:
          type: string
          maxLength: 20
        building_name:
          type: string
        building_number:
          type: string
        comment:
          type: string
        country:
          type: string
        county:
          type: string
        street:
          type: string
        town:
          type: string
    AddressResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        postal_code:
          type: string
          maxLength: 20
        building_name:
          type: string
        building_number:
          type: string
        comment:
          type: string
        country:
          type: string
        county:
          type: string
        street:
          type: string
        town:
          type: string
    SupplierRequestDTO:
      type: object
      required:
        - name
        - flag_preferred
      properties:
        name:
          type: string
        flag_preferred:
          type: boolean
        vat_id:
          type: string
          maxLength: 20
        email:
          type: string
          maxLength: 45
        fax:
          type: string
          maxLength: 45
        phone:
          type: string
          maxLength: 45
        comment:
          type: string
        website:
          type: string
    SupplierResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        deactivated_date:
          type: string
          format: date
        flag_preferred:
          type: boolean
        vat_id:
          type: string
          maxLength: 20
        email:
          type: string
          maxLength: 45
        fax:
          type: string
          maxLength: 45
        phone:
          type: string
          maxLength: 45
        comment:
          type: string
        website:
          type: string
    CustomerIdRequestDTO:
      type: object
      required:
        - supplier_id
        - customer_id
      properties:
        supplier_id:
          type: integer
          format: int64
          description: ID of the related supplier
        customer_id:
          type: string
          description: Customer identifier (external or internal)
        comment:
          type: string
          description: Optional comment about the customer ID
    CustomerIdResponseDTO:
      type: object
      properties:
        supplier_id:
          type: integer
          format: int64
          description: ID of the related supplier
        customer_id:
          type: string
          description: Customer identifier (external or internal)
        comment:
          type: string
          description: Optional comment about the customer ID

