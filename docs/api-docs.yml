openapi: 3.0.1
info:
  title: Bestellsystem API
  version: v1.2.0
servers:
  - url: http://localhost:3000/api/v1
    description: Generierte Server-URL
paths:
  /addresses:
    get:
      tags:
        - Addresses
      
      operationId: getAllAddresses
      deprecated: true
      responses:
        '200':
          description: Eine Liste von Adressen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressResponseDTO'
    post:
      tags:
        - Addresses
      operationId: createAddress
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequestDTO'
      responses:
        '201':
          description: Adresse erfolgreich erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponseDTO'
        '400':
          description: Ungültige Eingabe


  /addresses/{id}:
      get:
        tags:
          - Addresses
        operationId: getAddressById
        deprecated: true
        parameters:
          - name: id
            in: path
            required: true
            description: Eindeutige ID der Adresse
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: Adresse gefunden.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/AddressResponseDTO'
          '404':
            description: Adresse nicht gefunden.
  /persons/{id}:
    get:
      tags:
        - Persons
      operationId: getPersonById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PersonResponseDTO'
  /persons:
    get:
      tags:
        - Persons
      
      operationId: getAllPersons
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonResponseDTO'
    post:
      tags:
        - Persons
      
      operationId: createPerson
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonRequestDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PersonResponseDTO'
        '500':
          description: Interner Serverfehler.
  /persons/addresses:
    get:
      tags:
        - Persons
      description: Gibt eine Liste aller Adressen zurück, die Personen zugeordnet sind.
      responses:
        '200':
          description: Erfolgreich – Liste der Personenadressen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressResponseDTO'

  /persons/{person-id}/address:
    get:
      tags:
        - Persons
      description: Gibt die Adresse der angegebenen Person zurück.
      parameters:
        - name: person-id
          in: path
          required: true
          description: Die ID der Person, deren Adresse abgerufen werden soll
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Erfolgreich – Adresse der Person
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponseDTO'
        '404':
          description: Person nicht gefunden. Diese Person besitzt keine Adresse.
  /suppliers:
    get:
      tags:
        - Suppliers
      operationId: getAllSuppliers
      responses:
        '200':
          description: Liste von Lieferanten
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupplierResponseDTO'
    post:
      tags:
        - Suppliers
      operationId: createSupplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplierRequestDTO'
      responses:
        '201':
          description: Lieferant erfolgreich erstellt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponseDTO'
        '400':
          description: Ungültige Eingabe(n).
        '500':
          description: Interner Serverfehler.
  /suppliers/{supplier-id}:
    get:
      tags:
        - Suppliers
      operationId: getSupplierById
      parameters:
        - name: supplier-id
          in: path
          required: true
          description: Die eindeutige ID des Lieferanten, welcher abgerufen werden soll.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Lieferant gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponseDTO'
        '404':
          description: Lieferant nicht gefunden.
  /suppliers/{supplier-id}/customer_ids:
    get:
      tags:
        - Suppliers
      operationId: getCustomerIdsOfOrder
      parameters:
        - name: supplier-id
          in: path
          required: true
          description: Die eindeutige ID des Lieferanten, für welchen die Kundennummern abgerufen werden sollen.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Liste der Kundennummern eines Lieferanten.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerIdResponseDTO'
        '404':
          description: Lieferant nicht gefunden.
    post:
      tags:
        - Suppliers
      operationId: createSupplierCustomerId
      parameters:
        - name: supplier-id
          in: path
          required: true
          description: Die eindeutige ID des Lieferanten, für welchen die Kundennummern erstellt werden soll.
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerIdRequestDTO'
      responses:
        '201':
          description: Kundennummer erfolgreich erstellt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerIdResponseDTO'
        '404':
          description: Lieferant nicht gefunden.
        '409':
          description: |
            Lieferantennummer bereits vorhanden für diesen Lieferanten.
            Verweis auf eine nicht existierende Entität.
        '500':
          description: Interner Serverfehler.
  /suppliers/addresses:
    get:
      tags:
        - Suppliers
      responses:
        '200':
          description: Liste aller Adressen.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressResponseDTO'

  /suppliers/{supplier-id}/address:
    get:
      tags:
        - Suppliers
      parameters:
        - name: supplier-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Adresse des Lieferanten.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponseDTO'
        '404':
          description: Lieferant nicht gefunden. Dieser Lieferant besitzt keine Adresse.
  /orders:
    get:
      tags:
        - Orders
      operationId: getAllOrders
      parameters:
        - name: page
          in: query
          description: Seitenzahl für die Paginierung (beginnend bei 0).
          required: false
          schema:
            type: integer
            default: 0

        - name: size
          in: query
          description: Anzahl der Elemente pro Seite.
          required: false
          schema:
            type: integer
            default: 20

        - name: sort
          in: query
          description: >
            Sortierung der Ergebnisse. Mehrfache Sortierfelder möglich, z. B. 
            `sort=bookingYear,desc&sort=id,asc` sortiert zuerst nach `bookingYear` (absteigend),
            dann nach `id` (aufsteigend).
          required: false
          schema:
            type: array
            items:
              type: string
              example: bookingYear,desc

        - name: primaryCostCenters
          in: query
          description: Filtert nach IDs der primären Kostenstellen.
          required: false
          schema:
            type: array
            items:
              type: string
          example: primaryCostCenters=1,2,3

        - name: bookingYears
          in: query
          description: Filtert nach den letzten zwei Ziffern der Jahreszahl der Buchung. Achtung, diese muss ein String sein, z.B. "25".
          required: false
          schema:
            type: array
            items:
              type: string

        - name: createdAfter
          in: query
          description: Filtert nach Bestellungen, welche nach oder zu diesem Zeitpunkt erstellt wurden.
          required: false
          schema:
            type: string
            format: date-time
            example: 2022-09-26T15:22:01Z

        - name: createdBefore
          in: query
          description: Filtert nach Bestellungen, welche vor oder zu diesem Zeitpunkt erstellt wurden.
          required: false
          schema:
            type: string
            format: date-time
            example: 2022-09-26T15:22:01Z

        - name: ownerIds
          in: query
          description: Filtert nach IDs der Ersteller der Bestellung.
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int32

        - name: statuses
          in: query
          description: Filtert nach dem Bestellstatus.
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/OrderStatus'
            default:
              - ABR
              - ABS
              - ARC
              - INB
        - name: quotePriceMin
          in: query
          description: Filtert nach quotePriceMin.
          required: false
          schema:
            type: number
            format: decimal

        - name: quotePriceMax
          in: query
          description: Filtert nach quotePriceMax.
          required: false
          schema:
            type: number
            format: decimal

        - name: deliveryPersonIds
          in: query
          description: Filtert nach IDs der Besteller.
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64

        - name: invoicePersonIds
          in: query
          description: Filtert nach IDs invoicePersonIds.
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64

        - name: queriesPersonIds
          in: query
          description: Filtert nach IDs queriesPersonIds.
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64

        - name: customerIds
          in: query
          description: Filter nach Kundennummern.
          required: false
          schema:
            type: array
            items:
              type: string

        - name: supplierIds
          in: query
          description: Filtert nach IDs der Lieferanten.
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int32

        - name: secondaryCostCenters
          in: query
          description: Filtert nach IDs der sekundären Kostenstellen.
          required: false
          schema:
            type: array
            items:
              type: string

        - name: lastUpdatedTimeAfter
          in: query
          description: Filtert nach Bestellungen, welche nach oder zu diesem Zeitpunkt bearbeitet wurden.
          required: false
          schema:
            type: string
            format: date-time
            example: 2022-09-26T15:22:01Z

        - name: lastUpdatedTimeBefore
          in: query
          description: Filtert nach Bestellungen, welche vor oder zu diesem Zeitpunkt bearbeitet wurden.
          required: false
          schema:
            type: string
            format: date-time
            example: 2022-09-26T15:22:01Z
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PagedOrderResponseDTO'
    post:
      tags:
        - Orders
      operationId: createOrder
      description: >
        Erstellt eine neue Bestellung und setzt den `status` auf "In Bearbeitung".
        `booking_year` & `primary_cost_center_id` sind verpflichtend, um eine neue Bestellung anlegen zu können.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequestDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/OrderResponseDTO'
        '409':
          description: Verweis auf eine nicht existierende Entität.
        '500':
          description: Interner Serverfehler.
  /orders/{order-id}:
    get:
      tags:
        - Orders
      operationId: getOrderById
      parameters:
        - name: order-id
          in: path
          required: true
          description: Die eindeutige ID der Bestellung, die abgerufen werden soll.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                  $ref: '#/components/schemas/OrderResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
    delete:
      tags:
        - Orders
      operationId: deleteOrder
      description: >
        Löscht eine bestehende Bestellung anhand der `order-id` (Soft Delete). Setzt den Status der Bestellung auf `DEL` (gelöscht). Es sind nur Bestellungen löschbar, deren status != `DEL` ist.
      parameters:
        - name: order-id
          in: path
          description: ID der zu löschenden Bestellung.
          required: true
          schema:
            type: number
      responses:
        '204':
          description: Bestellung erfolgreich gelöscht (No Content).
        '404':
          description: Bestellung mit der angegebenen ID nicht gefunden.
        '500':
          description: Interner Serverfehler.
  /orders/{order-id}/items:
    get:
      tags:
        - Orders
      operationId: getOrderItems
      parameters:
        - in: path
          name: order-id
          required: true
          schema:
            type: string
          description: Die eindeutige ID der Bestellung, für welche die Artikel abgerufen werden sollen.
      responses:
        '200':
          description: Erfolgreich abgerufene Artikel einer Bestellung.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
    post:
      tags:
        - Orders
      operationId: createOrderItems
      parameters:
        - name: order-id
          in: path
          required: true
          description: Die eindeutige ID der Bestellung, für welche neue Artikel angelegt werden sollen.
          schema:
            type: integer
            format: int64
      description: >
        Erstellt neue Artikel einer Bestellung.
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/ItemRequestDTO'
        required: true
      responses:
        '201':
          description: OK
          content:
            '*/*':
              schema:
                items:
                  $ref: '#/components/schemas/ItemResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
        '409':
          description: Zugehöriger Artikel mit Artikelnummer `article_id` existiert bereits.
  /orders/{order-id}/items/{item-id}:
    delete:
      tags:
        - Orders
      operationId: deleteItemOfOrder
      description: >
        Löscht einen Artikel einer bestehenden Bestellung (`order-id`) anhand der `item-id` (Hard Delete).
      parameters:
        - name: order-id
          in: path
          description: ID der Bestellung, deren Artikel gelöscht werden soll.
          required: true
          schema:
            type: number
        - name: item-id
          in: path
          description: ID des Artikels, der gelöscht werden soll.
          required: true
          schema:
            type: number
      responses:
        '204':
          description: Bestellung erfolgreich gelöscht (No Content).
        '404':
          description: Bestellung nicht gefunden. Artikel nicht gefunden.
        '500':
          description: Interner Serverfehler.
  /orders/{order-id}/quotations:
    get:
      tags:
        - Orders
      operationId: getOrderQuotations
      parameters:
        - in: path
          name: order-id
          required: true
          schema:
            type: string
          description: Die eindeutige ID der Bestellung, für welche die Vergleichsangebote abgerufen werden sollen.
      responses:
        '200':
          description: Erfolgreich abgerufene Vergleichsangebote einer Bestellung.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuotationResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
    post:
      tags:
        - Orders
      operationId: createOrderQuotations
      parameters:
        - name: order-id
          in: path
          required: true
          description: Die eindeutige ID der Bestellung, für welche neue Vergleichsangebote angelegt werden sollen.
          schema:
            type: integer
            format: int64
      description: >
        Erstellt neue Vergleichsangebote einer Bestellung.
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/QuotationRequestDTO'
        required: true
      responses:
        '201':
          description: OK
          content:
            '*/*':
              schema:
                items:
                  $ref: '#/components/schemas/QuotationResponseDTO'
        '404':
          description: Bestellung nicht gefunden.
        '409':
          description: Zugehöriges Vergleichsangebot mit dem Index `index` existiert bereits.
  /orders/{order-id}/quotations/{quotation-id}:
    delete:
      tags:
        - Orders
      operationId: deleteQuotationOfOrder
      description: >
        Löscht ein Vergleichsangebot einer bestehenden Bestellung (`order-id`) anhand der `quotation-id` (Hard Delete).
      parameters:
        - name: order-id
          in: path
          description: ID der Bestellung, deren Vergleichsartikel gelöscht werden soll.
          required: true
          schema:
            type: number
        - name: quotation-id
          in: path
          description: ID des Vergleichsartikel, der gelöscht werden soll.
          required: true
          schema:
            type: number
      responses:
        '204':
          description: Vergleichsartikel erfolgreich gelöscht (No Content).
        '404':
          description: Bestellung nicht gefunden. Vergleichsartikel nicht gefunden.
        '500':
          description: Interner Serverfehler.
  /orders/{order-id}/export:
    get:
      tags:
        - Orders
      operationId: exportOrderToFormula
      parameters:
        - in: path
          name: order-id
          required: true
          schema:
            type: string
          description: Die eindeutige ID der Bestellung, für die das Bestellformular als PDF exportiert wird.
      responses:
        '200':
          description: PDF-Formular der Bestellung erfolgreich abgerufen.
          content:
            application/pdf: { }
        '404':
          description: Bestellung nicht gefunden.
  /cost_centers:
    get:
      tags:
        - CostCenters
      operationId: getCostCenters
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CostCenterResponseDTO'
    post:
      tags:
        - CostCenters
      operationId: createCostCenter
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostCenterRequestDTO'
        required: true
      responses:
        '201':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CostCenterResponseDTO'
        '409':
          description: Kostenstelle mit diesem Namen existiert bereits.
  /vats:
    get:
      tags:
        - Vat's
      operationId: getAllVats
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VatResponseDTO'
  /users:
    get:
      tags:
        - Users
      operationId: getAllUsers
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponseDTO'
  /currencies:
    get:
      tags:
        - Currencies
      operationId: getAllCurrencies
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CurrencyResponseDTO'
  /users/{id}:
    get:
      tags:
        - Users
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/UserResponseDTO'
  /insy/{order-id}:
    post:
      description: Sendet eine Bestellung anhand der Bestell-ID an das Insy-System.
      operationId: postOrderToInsy
      tags:
      - Insy
      parameters:
        - name: order-id
          in: path
          required: true
          description: ID der zu sendenden Bestellung.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Bestellung erfolgreich an Insy gesendet.
        '404':
          description: Bestellung nicht gefunden.
        '500':
          description: Interner Serverfehler.
components:
  schemas:
    PersonRequestDTO:
      type: object
      required:
        - name
        - surname
        - gender
      properties:
        name:
          type: string
        surname:
          type: string
        email:
          type: string
        fax:
          type: string
        phone:
          type: string
        title:
          type: string
        comment:
          type: string
        address_id:
          type: integer
        gender:
          type: string
          enum:
            - m
            - f
    PersonResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        surname:
          type: string
        email:
          type: string
        fax:
          type: string
        phone:
          type: string
        title:
          type: string
        comment:
          type: string
        address_id:
          type: integer
        gender:
          type: string
          enum:
            - m
            - f
    ItemRequestDTO:
      type: object
      required:
        - item_id
        - name
        - price_per_unit
        - quantity
        - vat_value
        - vat_type
      properties:
        item_id:
          type: number
        name:
          type: string
        price_per_unit:
          type: number
        quantity:
          type: integer
          format: int64
        quantity_unit:
          type: string
        article_id:
          type: string
        comment:
          type: string
        vat_value:
          type: string
        preferred_list:
          type: string
          enum:
            - RZ
            - TA
        preferred_list_number:
          type: string
        vat_type:
          type: string
          enum:
            - netto
            - brutto
    OrderRequestDTO:
      type: object
      required:
        - primary_cost_center_id
        - booking_year
      properties:
        primary_cost_center_id:
          type: string
        booking_year:
          type: string
          minLength: 2
          maxLength: 2
        legacy_alias:
          type: string
        owner_id:
          type: number
        content_description:
          type: string
        currency_short:
          type: string
        comment:
          type: string
        comment_for_supplier:
          type: string
        quote_number:
          type: string
        quote_sign:
          type: string
        quote_date:
          type: string
          format: date
        quote_price:
          type: number
        delivery_person_id:
          type: integer
          format: int64
        invoice_person_id:
          type: integer
          format: int64
        queries_person_id:
          type: integer
          format: int64
        customer_id:
          type: string
        supplier_id:
          type: integer
          format: int32
        secondary_cost_center_id:
          type: string
        fixed_discount:
          type: number
        percentage_discount:
          type: number
        cashback_percentage:
          type: number
        cashback_days:
          type: integer
          format: int32
        flag_decision_cheapest_offer:
          type: boolean
        flag_decision_sole_supplier:
          type: boolean
        flag_decision_contract_partner:
          type: boolean
        flag_decision_other_reasons:
          type: boolean
        decision_other_reasons_description:
          type: string
        flag_edv_permission:
          type: boolean
        flag_furniture_permission:
          type: boolean
