# Build backend Docker image and push to GitHub Container Registry (GHCR).
# On pull requests, the image is only built to validate the Dockerfile.

name: Build, Docker and push to GHCR

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Downcase image name
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME@L}" >> "${GITHUB_ENV}"

      - name: Set up Docker image tags
        id: vars
        run: |
          echo "BUILD_PROFILE=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Login to GitHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image for main
        uses: docker/build-push-action@v5
        if: (github.ref == 'refs/heads/main')
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Build and push backend image for other
        uses: docker/build-push-action@v5
        if: (github.ref != 'refs/heads/main')
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_PROFILE }}