spring.security.oauth2.client.registration.besy-for-insy-client.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.besy-for-insy-client.scope=profile
spring.security.oauth2.client.provider.keycloak-server.issuer-uri=https://auth.insy.hs-esslingen.com/realms/insy


